    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Outfit", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box {
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            width: 300px;
            max-width: 90%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box:focus {
            outline: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .filter-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: white;
            color: #667eea;
        }

        .countries-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .country-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .country-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .country-flag {
            font-size: 3em;
            margin-bottom: 10px;
            text-align: center;
        }

        .country-name {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .country-info {
            font-size: 0.9em;
            color: #666;
            line-height: 1.6;
        }

        .country-info p {
            margin-bottom: 8px;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .countries-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .search-box {
                width: 100%;
            }
        }
    </style>
</head>

        function displayCountries(countries) {
            const container = document.getElementById('countriesContainer');
            
            if (countries.length === 0) {
                container.innerHTML = '<div class="no-results">No countries found. Try a different search!</div>';
                return;
            }

            container.innerHTML = countries.map(country => `
                <div class="country-card">
                    <div class="country-flag">${country.flag}</div>
                    <div class="country-name">${country.name}</div>
                    <div class="country-info">
                        <p><span class="info-label">Capital:</span> ${country.capital}</p>
                        <p><span class="info-label">Continent:</span> ${country.continent}</p>
                        <p><span class="info-label">Population:</span> ${country.population}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterCountries() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredCountries = countriesData.filter(country => {
                const matchesSearch = country.name.toLowerCase().includes(searchTerm) ||
                                    country.capital.toLowerCase().includes(searchTerm);
                const matchesContinent = currentFilter === 'all' || country.continent === currentFilter;
                
                return matchesSearch && matchesContinent;
            });

            displayCountries(filteredCountries);
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterCountries);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.continent;
                filterCountries();
            });
        });

        // Initial display
        displayCountries(countriesData);
